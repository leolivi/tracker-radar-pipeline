name: Update Tracker Radar

on:
  # each Monday at 9am
  schedule:
    - cron: "0 9 * * 1"
    # manual trigger
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}

      # clone tracker-radar from DuckDuckGo repo
      - name: Clone DuckDuckGo Tracker Radar
        run: |
          git clone https://github.com/duckduckgo/tracker-radar.git

      # install node to run extract script
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # run extract script
      - name: Run extract script
        run: node extract.js

     #  push to extension repos
      - name: Push updated TS files to detecta repo
        run: |
          git clone https://${{ secrets.ACTIONS_TOKEN }}@github.com/leolivi/detecta.git detecta
          cp dist/tracker-core.json detecta/src/data/
          cp dist/tracker-extended.json detecta/src/data/
          cd detecta
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/data/tracker-core.json src/data/tracker-extended.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update tracker radar data (core + extended)"
            git push
          fi

      - name: Push updated TS files to klartxt repo
        run: |
          git clone https://${{ secrets.ACTIONS_TOKEN }}@github.com/leolivi/klartxt.git klartxt
          cp dist/tracker-core.json klartxt/src/data/trackers/
          cp dist/tracker-extended.json klartxt/src/data/trackers/
          cd klartxt
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add src/data/tracker-core.json src/data/tracker-extended.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update tracker radar data (core + extended)"
            git push
          fi
